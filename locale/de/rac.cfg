rac-input-label=Eingangssignal-Verarbeitung
rac-input-output-label=Eingangs-/Ausgangssignal-Verarbeitung
rac-output-label=Ausgangssignal-Verarbeitung
rac-research-mode=Forschungswarteschlange ändern
rac-research-mode-description=Die Forschungswarteschlange basierend auf dem Eingangssignal ändern.
rac-queue-tech-replace=Gesamte Warteschlange ersetzen
rac-queue-tech-replace-description=Leert die Forschungswarteschlange und fügt dann die Eingangstechnologien hinzu.
rac-queue-tech-front=Zum Anfang der Warteschlange hinzufügen
rac-queue-tech-front-description=Fügt fehlende Technologien am Anfang der Warteschlange hinzu.
rac-queue-tech-back=Am Ende der Warteschlange hinzufügen
rac-queue-tech-back-description=Fügt fehlende Technologien am Ende der Warteschlange hinzu.
rac-io-mode-label=Ausgabemodus
rac-io-mode-input-value=Ausgabewerte aus Eingabe abgeleitet
rac-io-mode-input-value-description=Der Wert der Ausgangssignale basiert auf den Eingangssignalwerten.\n\nBeispiel: Der Eingang ist das [font=default-bold]Logistik[/font]-Technologiesignal mit einem Signalwert von 4, und [font=default-bold]Technologie-Voraussetzungen abrufen[/font] ist ausgewählt, dann ist der Ausgang das [font=default-bold]Automatisierungs-Wissenschaftspaket[/font]-Technologiesignal, ebenfalls mit einem Wert von 4. Dieser Modus ist nützlich zum Multiplexen mehrerer Eingangssignale.
rac-io-mode-input-context=Ausgabewerte basierend auf Kontext
rac-io-mode-input-context-description=Der Wert der Ausgangssignale ist entweder 1 oder ein kontextabhängiger Wert.\n\nFür Ausgabetechnologien ist dies die Stufe der Technologie – was für unendliche Technologien nützlich ist.
rac-output-signals=Ausgangssignale
rac-research-get-prereq=Technologie-Voraussetzungen abrufen
rac-research-get-prereq-description=Ruft die Technologien ab, die vor den Technologien in den Eingangssignalen erforscht werden müssen. Wenn [font=default-bold]Ausgabewerte aus Eingabe abgeleitet[/font] ausgewählt ist, stimmen die Ausgabewerte mit jedem Eingangssignal überein. Wenn kontextbasierte Ausgabe ausgewählt ist, wird die Stufe jeder Voraussetzungstechnologie ausgegeben.
rac-research-get-successors=Technologie-Nachfolger abrufen
rac-research-get-successors-description=Ruft die Technologien ab, die nach den Technologien in den Eingangssignalen erforscht werden können. Wenn [font=default-bold]Ausgabewerte aus Eingabe abgeleitet[/font] ausgewählt ist, stimmen die Ausgabewerte mit jedem Eingangssignal überein. Wenn kontextbasierte Ausgabe ausgewählt ist, wird die Stufe jeder Nachfolgetechnologie ausgegeben.
rac-research-get-recipes=Durch Technologie freigeschaltete Rezepte abrufen
rac-research-get-recipes-description=Ruft die Rezepte ab, die durch Technologien in den Eingangssignalen freigeschaltet werden. Wenn [font=default-bold]Ausgabewerte aus Eingabe abgeleitet[/font] ausgewählt ist, stimmen die Ausgabewerte mit jedem Eingangssignal überein. Wenn kontextbasierte Ausgabe ausgewählt ist, gibt jedes Rezept einen Wert von 1 aus.
rac-research-get-items=Durch Technologie freigeschaltete Gegenstände abrufen
rac-research-get-items-description=Ruft die Gegenstände ab, die durch Technologien in den Eingangssignalen freigeschaltet werden. Wenn [font=default-bold]Ausgabewerte aus Eingabe abgeleitet[/font] ausgewählt ist, stimmen die Ausgabewerte mit jedem Eingangssignal überein. Wenn kontextbasierte Ausgabe ausgewählt ist, gibt jeder Gegenstand einen Wert von 1 aus.
rac-research-get-science-packs=Wissenschaftspakete für Technologie abrufen
rac-research-get-science-packs-description=Ruft die Wissenschaftspakete (oder Gegenstände) ab, die zum Erforschen der Technologien in den Eingangssignalen verwendet werden. Wenn [font=default-bold]Ausgabewerte aus Eingabe abgeleitet[/font] ausgewählt ist, stimmen die Ausgabewerte mit jedem Eingangssignal überein. Wenn kontextbasierte Ausgabe ausgewählt ist, ist die Ausgabe die erforderliche Anzahl pro Forschungsinkrement.

rac-research-current=Aktuelle Forschung auslesen
rac-research-current-description=Gibt die Technologie aus, die derzeit erforscht wird.
rac-research-current-percent=Forschungsfortschritt auslesen (%)
rac-research-current-percent-description=Gibt den aktuellen Forschungsfortschritt als Prozentwert aus (0–100).
rac-research-current-percent-label=Prozent
rac-research-current-percent-label-description=Der aktuelle Forschungsfortschritt in Prozent der erforschten Technologie.
rac-research-current-value=Forschungsfortschritt auslesen (Wert)
rac-research-current-value-description=Gibt den aktuellen (C) und verbleibenden (R) Forschungsfortschritt als numerische Werte des Gesamtforschungsaufwands (T) aus.
rac-research-current-current-label=Aktueller Fortschritt
rac-research-current-current-label-description=Der aktuelle Forschungsfortschritt der erforschten Technologie.
rac-research-current-remaining-label=Verbleibender Fortschritt
rac-research-current-remaining-label-description=Die verbleibende Forschungsmenge, die zum Abschließen der erforschten Technologie erforderlich ist.
rac-research-current-total-label=Gesamtforschung
rac-research-current-total-label-description=Die gesamte Forschungsmenge, die für die erforschte Technologie erforderlich ist.

rac-research-status=Forschungsstatus auslesen
rac-research-status-description=Gibt den aktuellen Forschungsstatus der Technologien aus.
rac-research-status-researched=Erforschte Technologien
rac-research-status-researched-description=Technologien, die bereits erforscht wurden.
rac-research-status-available=Verfügbare Technologien
rac-research-status-available-description=Technologien, die erforscht werden können (alle Voraussetzungen erfüllt).
rac-research-status-unresearched=Unerforschte Technologien
rac-research-status-unresearched-description=Technologien, die noch nicht erforscht wurden.

